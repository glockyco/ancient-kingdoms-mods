# Git hooks managed by lefthook (replaces husky + lint-staged).
# Refreshed automatically by `pnpm install` (root `prepare` script) or manually
# via `pnpm exec lefthook install`.
#
# Everything runs on pre-commit, scoped per package by glob: a website-only
# commit runs the website jobs and skips the Python ones, and vice versa. Within
# a package, jobs run top-to-bottom: format -> lint -> type-check -> test. Unlike
# lint-staged, lefthook runs against the real working tree, so SvelteKit's
# generated `.svelte-kit/types` are present and `svelte-check` reports accurately.

assert_lefthook_installed: true

pre-commit:
  skip:
    - merge
    - rebase
  jobs:
    - name: website-prettier
      root: website/
      glob: "**/*.{js,mjs,cjs,ts,svelte,css,json,md,html}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    - name: website-eslint
      root: website/
      glob: "**/*.{js,mjs,cjs,ts,svelte}"
      run: pnpm exec eslint --fix --max-warnings 0 {staged_files}
      stage_fixed: true
    - name: website-check
      glob: "website/**/*.{ts,svelte}"
      run: pnpm --filter website check
    - name: website-test
      glob: "website/**/*.{ts,svelte}"
      run: pnpm --filter website test
    - name: website-skill-effect-parity-drift
      glob: "{website/src/lib/utils/formatSkillEffect.ts,website/src/lib/utils/format.ts,website/src/lib/skills/*.ts,website/scripts/gen-skill-effect-parity.ts,tests/BetterBestiary.Tests/Fixtures/skill-effect-parity.json}"
      run: pnpm --filter website gen:skill-effect-parity && git diff --exit-code -- tests/BetterBestiary.Tests/Fixtures/skill-effect-parity.json
    - name: build-pipeline-ruff-format
      root: build-pipeline/
      glob: "**/*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true
    - name: build-pipeline-ruff-lint
      root: build-pipeline/
      glob: "**/*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true
    - name: build-pipeline-mypy
      root: build-pipeline/
      glob: "**/*.py"
      run: uv run mypy .
    - name: build-pipeline-test
      root: build-pipeline/
      glob: "**/*.py"
      run: uv run pytest
    - name: plans docs
      glob: "docs/plans/**/*.md"
      run: omp-plans index && omp-plans check
      stage_fixed: true
      skip:
        - run: "! command -v omp-plans"

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}
